<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MusiFree TV - Specchia lo Schermo & Music TV</title>
  <meta name="description" content="Trasforma il tuo browser in una TV musicale con testi sincronizzati o specchia lo schermo del tuo telefono via WebRTC.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='none'><defs><linearGradient id='g' x1='0%25' y1='100%25' x2='100%25' y2='0%25'><stop offset='0%25' stop-color='%232f60ff'/><stop offset='50%25' stop-color='%239d27ff'/><stop offset='100%25' stop-color='%23ff00ff'/></linearGradient></defs><circle cx='34' cy='63' r='12' fill='url(%23g)'/><circle cx='66' cy='57' r='12' fill='url(%23g)'/><path d='M 40 63 L 40 31 L 56 43 L 72 31 L 72 57' stroke='url(%23g)' stroke-width='12' stroke-linecap='round' stroke-linejoin='round'/></svg>">

  <!-- CDNs for styling & icons & signaling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* Premium Design CSS variables */
    :root {
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --font-display: 'Outfit', var(--font-sans);
      --bg-color: 240 20% 2%;
      --fg-color: 0 0% 100%;
      --primary-color: 280 100% 65%;
      --accent-color: 320 100% 60%;
      
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.05);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
    }

    body {
      font-family: var(--font-sans);
      background-color: hsl(var(--bg-color));
      color: hsl(var(--fg-color));
      overflow: hidden;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Ambient Background Glow */
    .ambient-bg-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: -2;
      overflow: hidden;
      background-color: #050508;
      pointer-events: none;
    }

    .ambient-glow-ball {
      position: absolute;
      border-radius: 50%;
      mix-blend-mode: screen;
      opacity: 0.4;
      filter: blur(90px);
    }

    @keyframes ambientGlow1 {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(10vw, 10vh) scale(1.2); }
      100% { transform: translate(0, 0) scale(1); }
    }

    @keyframes ambientGlow2 {
      0% { transform: translate(0, 0) scale(1); }
      50% { transform: translate(-10vw, -10vh) scale(1.3); }
      100% { transform: translate(0, 0) scale(1); }
    }

    .ball-1 {
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, hsl(var(--primary-color)) 0%, transparent 60%);
      top: -20%;
      left: -10%;
      animation: ambientGlow1 20s infinite alternate ease-in-out;
    }

    .ball-2 {
      width: 60vw;
      height: 60vw;
      background: radial-gradient(circle, hsl(var(--accent-color)) 0%, transparent 60%);
      bottom: -20%;
      right: -10%;
      animation: ambientGlow2 25s infinite alternate-reverse ease-in-out;
    }

    /* Blurred Background Art */
    .blurred-album-art {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: -1;
      background-size: cover;
      background-position: center;
      filter: blur(80px) brightness(0.4) saturate(1.5);
      transform: scale(1.2);
      transition: background-image 1.5s ease-in-out;
      pointer-events: none;
      opacity: 0;
    }

    .blurred-album-art.active {
      opacity: 1;
    }

    /* Glassmorphism Styles */
    .liquid-glass {
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 30px 60px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .liquid-glass-card {
      background: linear-gradient(135deg, rgba(255,255,255,0.05), rgba(255,255,255,0.01));
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 32px;
      box-shadow: 0 20px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2);
    }

    /* Synced Lyrics Scroll Pane */
    .lyrics-container {
      overflow-y: scroll;
      scroll-behavior: smooth;
      height: 100%;
      padding: 40vh 0;
      mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
      -webkit-mask-image: linear-gradient(to bottom, transparent, black 15%, black 85%, transparent);
    }

    .lyrics-container::-webkit-scrollbar {
      display: none;
    }

    .lyric-line {
      font-family: var(--font-display);
      font-size: 2.5rem;
      font-weight: 700;
      line-height: 1.5;
      padding: 16px 24px;
      color: rgba(255, 255, 255, 0.2);
      transform-origin: left center;
      transition: all 0.7s cubic-bezier(0.25, 1, 0.5, 1);
      filter: blur(2px);
      transform: scale(0.95);
    }

    .lyric-line.active {
      color: #ffffff;
      font-size: 3.5rem;
      font-weight: 800;
      filter: blur(0px) drop-shadow(0 0 20px rgba(255, 255, 255, 0.3));
      transform: scale(1.05);
      padding-left: 32px;
      background: linear-gradient(90deg, #fff, #e0e0e0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .lyric-line.past {
      color: rgba(255, 255, 255, 0.4);
      filter: blur(1px);
    }

    .lyric-line.future {
      color: rgba(255, 255, 255, 0.2);
    }

    /* Album art card on TV */
    .album-art-tv {
      width: 100%;
      max-width: 460px;
      aspect-ratio: 1;
      margin: 0 auto;
      border-radius: 32px;
      overflow: hidden;
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 40px rgba(255,255,255,0.1);
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .album-art-tv.playing {
      transform: scale(1.02);
      box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8), 0 0 60px rgba(255,255,255,0.15);
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, #fff, #e0e0e0);
      border-radius: 8px;
      width: 0%;
      transition: width 0.1s linear;
      box-shadow: 0 0 10px rgba(255,255,255,0.5);
    }

    /* Pulse animation for waiting screen */
    @keyframes heartbeat {
      0% { transform: scale(1); }
      15% { transform: scale(1.1); }
      30% { transform: scale(1); }
      45% { transform: scale(1.1); }
      60% { transform: scale(1); }
      100% { transform: scale(1); }
    }
    .heartbeat {
      animation: heartbeat 2s infinite;
    }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <!-- Dynamic ambient background -->
  <div class="ambient-bg-container">
    <div class="ambient-glow-ball ball-1"></div>
    <div class="ambient-glow-ball ball-2"></div>
  </div>
  <div id="tv-blur-bg" class="blurred-album-art"></div>

  <!-- MAIN WRAPPER -->
  <main class="flex-1 w-full flex flex-col relative z-10">
    
    <!-- TV VIEW -->
    <div id="view-tv" class="flex-1 flex flex-col p-10 h-screen overflow-hidden relative">
      
      <!-- TV Header -->
      <div class="flex justify-between items-center w-full mb-8 z-10">
        <div class="flex items-center gap-4 liquid-glass px-5 py-2.5 rounded-full">
          <div id="tv-status-dot" class="w-4 h-4 rounded-full bg-gray-500 animate-pulse shadow-[0_0_10px_rgba(156,163,175,0.5)]"></div>
          <span id="tv-status-text" class="text-sm font-bold tracking-widest text-gray-300">INIZIALIZZAZIONE...</span>
        </div>
        <div class="flex gap-4">
          <button onclick="toggleFullscreen()" class="liquid-glass p-3 rounded-full hover:bg-white/10 transition-colors">
            <i data-lucide="maximize" id="fs-icon"></i>
          </button>
        </div>
      </div>

      <!-- TV Wait Screen -->
      <div id="tv-wait-screen" class="flex-1 flex items-center justify-center z-10">
        <div class="liquid-glass-card p-12 max-w-2xl w-full text-center flex flex-col items-center">
          <div class="w-28 h-28 mb-8 heartbeat">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
              <defs>
                <linearGradient id="logo-grad-wait" x1="0%" y1="100%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#fff" />
                  <stop offset="100%" stop-color="#aaa" />
                </linearGradient>
              </defs>
              <circle cx="34" cy="63" r="12" fill="url(#logo-grad-wait)" />
              <circle cx="66" cy="57" r="12" fill="url(#logo-grad-wait)" />
              <path d="M 40 63 L 40 31 L 56 43 L 72 31 L 72 57" stroke="url(#logo-grad-wait)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" />
            </svg>
          </div>
          <h2 class="font-display text-4xl font-extrabold mb-4 text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-400">MusiFree TV</h2>
          <p class="text-lg text-gray-300 mb-10 font-medium">Usa l'app per inserire questo codice numerico e avviare la magia.</p>
          
          <div class="flex flex-col gap-4 items-center justify-center liquid-glass p-8 rounded-3xl w-full text-center">
            <span class="text-xs text-gray-400 block uppercase tracking-[0.3em] font-bold mb-2">Codice Stanza</span>
            <span id="tv-room-code" class="font-display text-7xl font-black text-white tracking-[0.1em] block drop-shadow-lg">-----</span>
            <span id="tv-domain-url" class="text-sm text-gray-400 mt-4 block font-medium"></span>
          </div>
        </div>
      </div>

      <!-- TV Smart Player View -->
      <div id="tv-player-screen" class="hidden flex-1 grid grid-cols-1 lg:grid-cols-12 gap-12 items-center h-full pb-10">
        <!-- Left panel: Art Cover & hidden YT player -->
        <div class="lg:col-span-5 flex flex-col gap-10 justify-center h-full">
          <div id="tv-album-art-container" class="relative album-art-tv mx-auto">
            <!-- Hidden YouTube Player Iframe -->
            <div id="youtube-player" class="absolute inset-0 w-full h-full object-cover opacity-0 pointer-events-none" style="z-index: 1;"></div>
            <!-- Art thumbnail -->
            <img id="tv-track-cover" src="" alt="" class="w-full h-full object-cover">
          </div>
          
          <div class="text-left px-4 liquid-glass p-8 rounded-3xl">
            <h2 id="tv-track-title" class="font-display text-3xl font-extrabold text-white mb-2 truncate drop-shadow-md">Titolo Canzone</h2>
            <p id="tv-track-artist" class="text-xl font-medium text-gray-300 truncate drop-shadow-sm mb-8">Artista</p>
            
            <div class="flex items-center gap-5">
              <span id="tv-time-current" class="text-sm font-bold text-gray-400 w-12 text-right">0:00</span>
              <div class="progress-bar-container flex-1">
                <div id="tv-progress-fill" class="progress-bar-fill"></div>
              </div>
              <span id="tv-time-duration" class="text-sm font-bold text-gray-400 w-12 text-left">0:00</span>
            </div>
          </div>
        </div>

        <!-- Right panel: scroll lyrics -->
        <div class="lg:col-span-7 h-full relative">
          <div id="tv-lyrics-list" class="lyrics-container px-8">
            <!-- Dynamic lyrics load here -->
            <div class="flex h-full items-center justify-center text-gray-400 font-display text-3xl font-bold">
              In attesa della musica...
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    // --- STATE MANAGEMENT ---
    let peer = null;
    let conn = null; // PeerJS DataConnection
    let pairingCode = '';

    // Playback States
    let currentTrack = null;
    let isPlaying = false;
    let ytPlayer = null;
    let lyricsLines = [];
    let currentLyricIndex = -1;

    // --- INITIALIZATION ---
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      initTV();
    });

    function initTV() {
      // Generate unique short pairing code: 5 numbers
      const randomNum = Math.floor(10000 + Math.random() * 90000);
      pairingCode = String(randomNum);
      
      document.getElementById('tv-room-code').innerText = pairingCode;
      document.getElementById('tv-domain-url').innerText = `Sito: ${window.location.host}`;

      // Initialize PeerJS on TV
      peer = new Peer(pairingCode);

      peer.on('open', (id) => {
        const dot = document.getElementById('tv-status-dot');
        dot.className = "w-4 h-4 rounded-full bg-yellow-400 animate-pulse shadow-[0_0_15px_rgba(250,204,21,0.6)]";
        document.getElementById('tv-status-text').innerText = "IN ATTESA DEL TELEFONO";
      });

      peer.on('connection', (connection) => {
        conn = connection;
        handleTVConnection();
      });

      peer.on('error', (err) => {
        console.error('TV Peer error:', err);
        const dot = document.getElementById('tv-status-dot');
        dot.className = "w-4 h-4 rounded-full bg-red-500 shadow-[0_0_15px_rgba(239,68,68,0.6)]";
        document.getElementById('tv-status-text').innerText = "ERRORE DI CONNESSIONE";
      });
    }

    function handleTVConnection() {
      const dot = document.getElementById('tv-status-dot');
      dot.className = "w-4 h-4 rounded-full bg-green-400 shadow-[0_0_15px_rgba(74,222,128,0.6)]";
      document.getElementById('tv-status-text').innerText = "TELEFONO COLLEGATO";
      document.getElementById('tv-wait-screen').classList.add('hidden');
      document.getElementById('tv-player-screen').classList.remove('hidden');

      // Request fullscreen on connection
      requestFullscreen();

      // Listen for control commands from remote
      conn.on('data', (data) => {
        if (data.type === 'state-sync') {
          handleCastedMedia(data.state);
        }
      });
    }

    // YouTube API script loader
    if (!window.YT) {
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      const firstScriptTag = document.getElementsByTagName('script')[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
    }

    // Handles playing media sent from remote
    function handleCastedMedia(state) {
      const isNewTrack = !currentTrack || currentTrack.id !== state.track.id;
      
      // se l'array delle lyrics è cambiato in lunghezza (es. prima era empty e ora sono arrivate), ricarichiamo le lyrics
      const hasNewLyrics = currentTrack && state.track.lyrics && currentTrack.lyrics !== state.track.lyrics;
      
      currentTrack = state.track;
      isPlaying = state.isPlaying;

      if (isNewTrack) {
        document.getElementById('tv-track-title').innerText = currentTrack.title;
        document.getElementById('tv-track-artist').innerText = currentTrack.artist;
        document.getElementById('tv-track-cover').src = currentTrack.thumbnailURL;
        
        // Dynamic Blur Ambient Background
        const bgBlur = document.getElementById('tv-blur-bg');
        bgBlur.style.backgroundImage = `url(${currentTrack.thumbnailURL})`;
        bgBlur.classList.add('active');

        // Reset progress & lyrics
        document.getElementById('tv-progress-fill').style.width = '0%';
        document.getElementById('tv-time-current').innerText = '0:00';
        document.getElementById('tv-time-duration').innerText = '0:00';
        
        // Load lyrics
        setTVLyrics(currentTrack.lyricsType, currentTrack.lyrics);

        // Load YouTube Player
        loadYTPlayer(currentTrack.id, isPlaying);
      } else if (hasNewLyrics) {
        // Lyrics loaded async on the phone
        setTVLyrics(currentTrack.lyricsType, currentTrack.lyrics);
      }

      // Sync Player state
      if (ytPlayer && typeof ytPlayer.getPlayerState === 'function') {
        if (isPlaying) {
          ytPlayer.playVideo();
          document.getElementById('tv-album-art-container').classList.add('playing');
        } else {
          ytPlayer.pauseVideo();
          document.getElementById('tv-album-art-container').classList.remove('playing');
        }

        // We DO NOT seek ytPlayer on the TV. The TV audio should ideally be muted so it doesn't echo.
        // Wait, the phone audio is playing. TV should just show lyrics synced to phone.
        // Let's mute TV to prevent echo!
        ytPlayer.mute();
      }

      // Update progress bar visually
      const duration = (ytPlayer && ytPlayer.getDuration) ? (ytPlayer.getDuration() || 0) : 0;
      if (duration > 0) {
        document.getElementById('tv-time-current').innerText = formatTime(state.progress);
        document.getElementById('tv-time-duration').innerText = formatTime(duration);
        const percent = (state.progress / duration) * 100;
        document.getElementById('tv-progress-fill').style.width = `${percent}%`;
      }

      // 100% PERFECT SYNC: Use iPhone's currentLineIndex!
      if (state.currentLineIndex !== undefined) {
        syncLyricsByIndex(state.currentLineIndex);
      }
    }

    function loadYTPlayer(videoId, autoPlay) {
      if (ytPlayer) {
        ytPlayer.loadVideoById(videoId);
        if (!autoPlay) ytPlayer.pauseVideo();
        ytPlayer.mute(); // Mute to prevent echo with phone
        return;
      }

      ytPlayer = new YT.Player('youtube-player', {
        height: '100%',
        width: '100%',
        videoId: videoId,
        host: 'https://www.youtube-nocookie.com',
        playerVars: {
          'autoplay': autoPlay ? 1 : 0,
          'controls': 0,
          'disablekb': 1,
          'rel': 0,
          'modestbranding': 1,
          'iv_load_policy': 3,
          'fs': 0,
          'cc_load_policy': 0,
          'playsinline': 1,
          'origin': window.location.origin
        },
        events: {
          'onReady': (event) => {
            event.target.mute(); // Mute TV to prevent echo!
            const dur = event.target.getDuration();
            document.getElementById('tv-time-duration').innerText = formatTime(dur);
            if (autoPlay) {
              event.target.playVideo();
              document.getElementById('tv-album-art-container').classList.add('playing');
            }
          }
        }
      });
    }

    // Lyrics loader
    function setTVLyrics(type, rawLyrics) {
      const container = document.getElementById('tv-lyrics-list');
      container.innerHTML = '';
      currentLyricIndex = -1;

      if (type === 'notFound' || !rawLyrics) {
        lyricsLines = [];
        container.innerHTML = `<div class="flex h-full items-center justify-center text-gray-500 font-display text-2xl font-bold">Testo non disponibile</div>`;
        return;
      }

      if (type === 'synced') {
        lyricsLines = parseLrc(rawLyrics);
      } else {
        lyricsLines = parsePlain(rawLyrics);
      }

      lyricsLines.forEach((line, idx) => {
        const div = document.createElement('div');
        div.className = 'lyric-line future';
        div.setAttribute('data-index', idx);
        div.innerText = line.text;
        container.appendChild(div);
      });
    }

    function syncLyricsByIndex(index) {
      if (lyricsLines.length === 0 || index < 0 || index >= lyricsLines.length) return;

      if (index !== currentLyricIndex) {
        currentLyricIndex = index;
        
        const lines = document.querySelectorAll('.lyric-line');
        lines.forEach((line, idx) => {
          line.classList.remove('active', 'past', 'future');
          if (idx === currentLyricIndex) {
            line.classList.add('active');
            
            // Scroll to center smoothly
            line.scrollIntoView({
              behavior: 'smooth',
              block: 'center'
            });
          } else if (idx < currentLyricIndex) {
            line.classList.add('past');
          } else {
            line.classList.add('future');
          }
        });
      }
    }

    // Fullscreen Helpers
    function requestFullscreen() {
      const doc = document.documentElement;
      if (doc.requestFullscreen) {
        doc.requestFullscreen().catch(() => {});
      }
    }

    function toggleFullscreen() {
      const icon = document.getElementById('fs-icon');
      if (document.fullscreenElement) {
        document.exitFullscreen().then(() => {
          icon.setAttribute('data-lucide', 'maximize');
          lucide.createIcons();
        });
      } else {
        document.documentElement.requestFullscreen().then(() => {
          icon.setAttribute('data-lucide', 'minimize');
          lucide.createIcons();
        }).catch(() => {});
      }
    }

    // --- PARSING HELPERS ---
    function parseLrc(lrcString) {
      const lines = [];
      const pattern = /\[(\d{2}):(\d{2})\.(\d{2,3})\]\s*(.*)/;
      
      const rawLines = lrcString.split('\n');
      rawLines.forEach(line => {
        const match = pattern.exec(line);
        if (match) {
          const min = parseInt(match[1]);
          const sec = parseInt(match[2]);
          const ms = parseInt(match[3]);
          const text = match[4].trim();
          
          const timestamp = min * 60 + sec + ms / (match[3].length === 2 ? 100 : 1000);
          if (text) {
            lines.push({ timestamp, text });
          }
        }
      });
      return lines.sort((a, b) => a.timestamp - b.timestamp);
    }

    function parsePlain(text) {
      return text.split('\n')
        .map(line => line.trim())
        .filter(line => line.length > 0)
        .map((line, index) => ({
          timestamp: index * 5.0,
          text: line
        }));
    }

    function formatTime(seconds) {
      if (isNaN(seconds) || seconds === null) return '0:00';
      const min = Math.floor(seconds / 60);
      const sec = Math.floor(seconds % 60);
      return `${min}:${sec < 10 ? '0' + sec : sec}`;
    }
  </script>
</body>
</html>
