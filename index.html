<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MusiFree TV - Specchia lo Schermo & Music TV</title>
  <meta name="description" content="Trasforma il tuo browser in una TV musicale con testi sincronizzati o specchia lo schermo del tuo telefono via WebRTC.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100' fill='none'><defs><linearGradient id='g' x1='0%25' y1='100%25' x2='100%25' y2='0%25'><stop offset='0%25' stop-color='%232f60ff'/><stop offset='50%25' stop-color='%239d27ff'/><stop offset='100%25' stop-color='%23ff00ff'/></linearGradient></defs><circle cx='34' cy='63' r='12' fill='url(%23g)'/><circle cx='66' cy='57' r='12' fill='url(%23g)'/><path d='M 40 63 L 40 31 L 56 43 L 72 31 L 72 57' stroke='url(%23g)' stroke-width='12' stroke-linecap='round' stroke-linejoin='round'/></svg>">

  <!-- CDNs for styling & icons & signaling -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    /* Premium Design CSS variables */
    :root {
      --font-sans: 'Inter', system-ui, -apple-system, sans-serif;
      --font-display: 'Outfit', var(--font-sans);
      --bg-color: 240 15% 4%;
      --fg-color: 0 0% 98%;
      --primary-color: 270 95% 65%;
      --accent-color: 320 100% 65%;
      
      --glass-bg: rgba(18, 18, 24, 0.45);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-hover: rgba(255, 255, 255, 0.12);
      --glass-card: rgba(20, 20, 28, 0.6);
    }

    body {
      font-family: var(--font-sans);
      background-color: hsl(var(--bg-color));
      color: hsl(var(--fg-color));
      overflow-x: hidden;
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    /* Ambient Background Glow */
    .ambient-bg-container {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: -2;
      overflow: hidden;
      background-color: #08080c;
      filter: blur(80px);
      pointer-events: none;
    }

    .ambient-glow-ball {
      position: absolute;
      border-radius: 50%;
      mix-blend-mode: screen;
      opacity: 0.2;
    }

    @keyframes ambientGlow {
      0% { transform: translate(0px, 0px) scale(1) rotate(0deg); }
      33% { transform: translate(30px, -50px) scale(1.1) rotate(120deg); }
      66% { transform: translate(-20px, 20px) scale(0.95) rotate(240deg); }
      100% { transform: translate(0px, 0px) scale(1) rotate(360deg); }
    }

    .ball-1 {
      width: 50vw;
      height: 50vw;
      background: radial-gradient(circle, hsl(var(--primary-color)) 0%, rgba(0,0,0,0) 70%);
      top: -10%;
      left: -10%;
      animation: ambientGlow 25s infinite alternate ease-in-out;
    }

    .ball-2 {
      width: 45vw;
      height: 45vw;
      background: radial-gradient(circle, hsl(var(--accent-color)) 0%, rgba(0,0,0,0) 70%);
      bottom: -10%;
      right: -10%;
      animation: ambientGlow 30s infinite alternate-reverse ease-in-out;
    }

    /* Blurred Background Art */
    .blurred-album-art {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: -1;
      background-size: cover;
      background-position: center;
      filter: blur(50px) brightness(0.3) saturate(1.3);
      transform: scale(1.1);
      transition: background-image 1.2s cubic-bezier(0.25, 1, 0.5, 1);
      pointer-events: none;
      opacity: 0;
    }

    .blurred-album-art.active {
      opacity: 1;
    }

    /* Glassmorphism Styles */
    .glass-panel {
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
    }

    .glass-card {
      background: var(--glass-card);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Synced Lyrics Scroll Pane */
    .lyrics-container {
      overflow-y: scroll;
      scroll-behavior: smooth;
      height: 100%;
      padding: 40vh 0;
    }

    .lyrics-container::-webkit-scrollbar {
      display: none;
    }

    .lyric-line {
      font-family: var(--font-display);
      font-size: 2.2rem;
      font-weight: 700;
      line-height: 1.4;
      padding: 12px 18px;
      color: rgba(255, 255, 255, 0.3);
      transform-origin: left center;
      transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
    }

    .lyric-line.active {
      color: #ffffff;
      font-size: 3.2rem;
      font-weight: 800;
      filter: drop-shadow(0 0 15px rgba(168, 85, 247, 0.5));
      text-shadow: 0 0 15px rgba(168, 85, 247, 0.45);
      padding-left: 24px;
    }

    .lyric-line.past {
      color: rgba(255, 255, 255, 0.15);
      font-size: 1.8rem;
      font-weight: 600;
    }

    .lyric-line.future {
      color: rgba(255, 255, 255, 0.4);
    }

    /* Album art card on TV */
    .album-art-tv {
      width: 100%;
      max-width: 380px;
      aspect-ratio: 1;
      margin: 0 auto;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.15);
      transition: transform 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .progress-bar-container {
      width: 100%;
      height: 6px;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 4px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: linear-gradient(90deg, hsl(var(--primary-color)) 0%, hsl(var(--accent-color)) 100%);
      border-radius: 4px;
      width: 0%;
      transition: width 0.1s linear;
    }

    .glass-button {
      background: rgba(255, 255, 255, 0.07);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      color: white;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      font-weight: 600;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .glass-button:hover:not(:disabled) {
      background: rgba(255, 255, 255, 0.14);
      border-color: rgba(255, 255, 255, 0.2);
      transform: scale(1.02);
    }
  </style>
</head>
<body class="flex flex-col min-h-screen">

  <!-- Dynamic ambient background -->
  <div class="ambient-bg-container">
    <div class="ambient-glow-ball ball-1"></div>
    <div class="ambient-glow-ball ball-2"></div>
  </div>
  <div id="tv-blur-bg" class="blurred-album-art"></div>

  <!-- MAIN WRAPPER -->
  <main class="flex-1 w-full flex flex-col relative z-10">
    
    <!-- TV VIEW -->
    <div id="view-tv" class="flex-1 flex flex-col p-8 h-screen overflow-hidden relative">
      
      <!-- AD POPUP -->
      <div id="tv-ad-popup" class="hidden absolute top-8 left-1/2 -translate-x-1/2 z-50 glass-panel px-6 py-3 rounded-full flex items-center gap-3 border border-yellow-500/30 bg-yellow-500/10 shadow-lg shadow-yellow-500/20 backdrop-blur-xl transition-all duration-300">
        <div class="w-2 h-2 rounded-full bg-yellow-500 animate-ping"></div>
        <span class="text-sm font-bold text-yellow-500 tracking-wide">Pubblicità in riproduzione...</span>
      </div>

      <!-- TV Header -->
      <div class="flex justify-between items-center w-full mb-6 z-10">
        <div class="flex items-center gap-3">
          <div id="tv-status-dot" class="w-3.5 h-3.5 rounded-full bg-gray-500 animate-pulse"></div>
          <span id="tv-status-text" class="text-xs font-semibold tracking-wider text-gray-400">CONNESSIONE PEER...</span>
        </div>
        <div class="flex gap-4">
          <button onclick="toggleFullscreen()" class="glass-button p-2.5 rounded-full">
            <i data-lucide="maximize" id="fs-icon"></i>
          </button>
          <button onclick="location.reload()" class="glass-button px-4 py-1.5 text-xs">Reset</button>
        </div>
      </div>

      <!-- TV Wait Screen -->
      <div id="tv-wait-screen" class="flex-1 flex items-center justify-center z-10">
        <div class="glass-card p-8 max-w-lg w-full text-center flex flex-col items-center">
          <div class="w-20 h-20 mb-5 animate-pulse">
            <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="w-full h-full">
              <defs>
                <linearGradient id="logo-grad-wait" x1="0%" y1="100%" x2="100%" y2="0%">
                  <stop offset="0%" stop-color="#2f60ff" />
                  <stop offset="50%" stop-color="#9d27ff" />
                  <stop offset="100%" stop-color="#ff00ff" />
                </linearGradient>
              </defs>
              <circle cx="34" cy="63" r="12" fill="url(#logo-grad-wait)" />
              <circle cx="66" cy="57" r="12" fill="url(#logo-grad-wait)" />
              <path d="M 40 63 L 40 31 L 56 43 L 72 31 L 72 57" stroke="url(#logo-grad-wait)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none" />
            </svg>
          </div>
          <h2 class="font-display text-2xl font-bold mb-3">Configura MusiFree TV</h2>
          <p class="text-xs text-gray-400 mb-6">Usa l'app per inserire questo codice numerico e avviare la riproduzione sulla TV.</p>
          
          <div class="flex flex-col gap-4 items-center justify-center bg-black/30 p-6 rounded-2xl border border-white/5 w-full text-center">
            <span class="text-[10px] text-gray-500 block uppercase tracking-wider mb-1">Codice Stanza</span>
            <span id="tv-room-code" class="font-display text-5xl font-extrabold text-white tracking-widest block">-----</span>
            <span id="tv-domain-url" class="text-[10px] text-purple-400 mt-1 block"></span>
          </div>
        </div>
      </div>

      <!-- TV Mirror Screen View (WebRTC) -->
      <div id="tv-mirror-screen" class="hidden flex-1 flex justify-center items-center relative rounded-2xl overflow-hidden glass-panel border border-white/5">
        <video id="tv-mirror-video" autoplay playsinline class="w-full h-full object-contain"></video>
        <div class="absolute top-4 left-4 glass-panel px-4 py-1.5 rounded-full text-[10px] flex items-center gap-2">
          <div class="w-2 h-2 rounded-full bg-red-500 animate-ping"></div>
          Specchio Schermo Attivo
        </div>
      </div>

      <!-- TV Smart Player View -->
      <div id="tv-player-screen" class="hidden flex-1 grid grid-cols-1 lg:grid-cols-12 gap-8 items-center h-full">
        <!-- Left panel: Art Cover & hidden YT player -->
        <div class="lg:col-span-5 flex flex-col gap-6 justify-center">
          <div class="relative album-art-tv">
            <!-- Hidden YouTube Player Iframe -->
            <div id="youtube-player" class="absolute inset-0 w-full h-full object-cover opacity-0 pointer-events-none" style="z-index: 1;"></div>
            <!-- Art thumbnail -->
            <img id="tv-track-cover" src="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1 1%22></svg>" alt="" class="w-full h-full object-cover">
          </div>
          
          <div class="text-left px-4">
            <h2 id="tv-track-title" class="font-display text-2xl font-extrabold text-white mb-1 truncate">Titolo Canzone</h2>
            <p id="tv-track-artist" class="text-purple-400 text-md font-medium truncate">Artista</p>
            
            <div class="flex items-center gap-4 mt-6">
              <span id="tv-time-current" class="text-[10px] text-gray-400">00:00</span>
              <div class="progress-bar-container flex-1">
                <div id="tv-progress-fill" class="progress-bar-fill"></div>
              </div>
              <span id="tv-time-duration" class="text-[10px] text-gray-400">00:00</span>
            </div>
          </div>
        </div>

        <!-- Right panel: scroll lyrics -->
        <div class="lg:col-span-7 glass-panel rounded-2xl h-[78vh] p-6 relative overflow-hidden">
          <div id="tv-lyrics-list" class="lyrics-container">
            <!-- Dynamic lyrics load here -->
            <div class="flex h-full items-center justify-center text-gray-500 font-display text-xl">
              Casting... in attesa di brani
            </div>
          </div>
          <!-- Edge Faders -->
          <div class="absolute top-0 left-0 right-0 h-20 bg-gradient-to-b from-[#0a0a0f] to-transparent pointer-events-none"></div>
          <div class="absolute bottom-0 left-0 right-0 h-20 bg-gradient-to-t from-[#0a0a0f] to-transparent pointer-events-none"></div>
        </div>
      </div>
    </div>

  </main>

  <script>
    // --- STATE MANAGEMENT ---
    let peer = null;
    let conn = null; // PeerJS DataConnection
    let callInstance = null; // PeerJS MediaCall
    let isMirroring = false;
    let pairingCode = '';

    // Playback States
    let currentTrack = null;
    let isPlaying = false;
    let ytPlayer = null;
    let progressInterval = null;
    let lyricsLines = [];
    let currentLyricIndex = -1;

    // --- INITIALIZATION ---
    document.addEventListener('DOMContentLoaded', () => {
      lucide.createIcons();
      initTV();
    });

    function initTV() {
      document.getElementById('view-tv').classList.remove('hidden');
      initTVPeer();
    }

    // --- TV CONTROLLER ---
    function initTVPeer() {
      // Generate unique short pairing code: 5 numbers
      const randomNum = Math.floor(10000 + Math.random() * 90000);
      pairingCode = String(randomNum);
      
      document.getElementById('tv-room-code').innerText = pairingCode;
      
      // Update domain URL helper
      document.getElementById('tv-domain-url').innerText = `Sito: ${window.location.host}`;

      // Initialize PeerJS on TV
      peer = new Peer(pairingCode);

      peer.on('open', (id) => {
        document.getElementById('tv-status-dot').className = "w-3.5 h-3.5 rounded-full bg-yellow-500 animate-pulse";
        document.getElementById('tv-status-text').innerText = "IN ATTESA DI CONTROLLER";
        console.log('TV Peer opened with ID:', id);
      });

      peer.on('connection', (connection) => {
        conn = connection;
        handleTVConnection();
      });

      peer.on('call', (call) => {
        callInstance = call;
        call.answer();
        
        call.on('stream', (stream) => {
          showTVMirror(stream);
        });
      });

      peer.on('error', (err) => {
        console.error('TV Peer error:', err);
        document.getElementById('tv-status-dot').className = "w-3.5 h-3.5 rounded-full bg-red-500";
        document.getElementById('tv-status-text').innerText = "ERRORE PEER CONNECTION";
      });
    }

    function handleTVConnection() {
      document.getElementById('tv-status-dot').className = "w-3.5 h-3.5 rounded-full bg-green-500";
      document.getElementById('tv-status-text').innerText = "TELECOMANDO ABBINATO";
      document.getElementById('tv-wait-screen').classList.add('hidden');
      document.getElementById('tv-player-screen').classList.remove('hidden');

      // Request fullscreen on connection
      requestFullscreen();

      // Listen for control commands from remote
      conn.on('data', (data) => {
        if (data.type === 'state-sync') {
          handleCastedMedia(data.state);
        } else if (data.type === 'stop-mirroring') {
          stopMirroringTV();
        }
      });
    }

    // YouTube API script loader callback
    if (!window.YT) {
      const tag = document.createElement('script');
      tag.src = 'https://www.youtube.com/iframe_api';
      const firstScriptTag = document.getElementsByTagName('script')[0];
      firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
    }

    // Handles playing media sent from remote
    function handleCastedMedia(state) {
      if (isMirroring) stopMirroringTV();

      const isNewTrack = !currentTrack || currentTrack.id !== state.track.id;
      currentTrack = state.track;
      isPlaying = state.isPlaying;

      if (isNewTrack) {
        document.getElementById('tv-track-title').innerText = currentTrack.title;
        document.getElementById('tv-track-artist').innerText = currentTrack.artist;
        document.getElementById('tv-track-cover').src = currentTrack.thumbnailURL;
        
        // Dynamic Blur Ambient Background
        const bgBlur = document.getElementById('tv-blur-bg');
        bgBlur.style.backgroundImage = `url(${currentTrack.thumbnailURL})`;
        bgBlur.classList.add('active');

        // Reset progress & lyrics
        document.getElementById('tv-progress-fill').style.width = '0%';
        document.getElementById('tv-time-current').innerText = '00:00';
        document.getElementById('tv-time-duration').innerText = '00:00';
        
        // Load lyrics
        setTVLyrics(currentTrack.lyricsType, currentTrack.lyrics);

        // Load YouTube Player
        loadYTPlayer(currentTrack.id, isPlaying);
      } else {
        // Sync Player
        if (ytPlayer && typeof ytPlayer.getPlayerState === 'function') {
          if (isPlaying) {
            ytPlayer.playVideo();
          } else {
            ytPlayer.pauseVideo();
          }

          // Seek sync
          const currentTvTime = ytPlayer.getCurrentTime() || 0;
          if (Math.abs(currentTvTime - state.progress) > 2.5) {
            ytPlayer.seekTo(state.progress, true);
          }
        }
      }
    }

    let currentRequestedVideoId = null;

    function loadYTPlayer(videoId, autoPlay) {
      currentRequestedVideoId = videoId;
      if (ytPlayer) {
        try {
          ytPlayer.destroy();
          ytPlayer = null;
        } catch (e) {}
      }

      // Recreate the player container div (YT.Player replaces it with an iframe)
      const container = document.getElementById('youtube-player');
      if (container && container.tagName === 'IFRAME') {
        const newDiv = document.createElement('div');
        newDiv.id = 'youtube-player';
        newDiv.className = 'absolute inset-0 w-full h-full object-cover opacity-0 pointer-events-none';
        newDiv.style.zIndex = '1';
        container.parentNode.replaceChild(newDiv, container);
      }

      ytPlayer = new YT.Player('youtube-player', {
        height: '100%',
        width: '100%',
        videoId: videoId,
        host: 'https://www.youtube-nocookie.com',
        playerVars: {
          'autoplay': autoPlay ? 1 : 0,
          'controls': 1,
          'disablekb': 1,
          'rel': 0,
          'modestbranding': 1,
          'iv_load_policy': 3,
          'fs': 0,
          'cc_load_policy': 0,
          'playsinline': 1,
          'origin': window.location.origin
        },
        events: {
          'onReady': (event) => {
            const dur = event.target.getDuration();
            document.getElementById('tv-time-duration').innerText = formatTime(dur);
            if (autoPlay) event.target.playVideo();
          },
          'onStateChange': (event) => {
            const state = event.data;
            const playing = (state === YT.PlayerState.PLAYING);
            isPlaying = playing;
            
            // Ad Detection: if the currently playing video ID doesn't match our requested ID, it's an ad.
            // Also if duration is unusually short (< 60s) for a song that we know is longer, but video_id check is safer.
            const currentVideoData = ytPlayer.getVideoData();
            const isAd = currentVideoData && currentVideoData.video_id && currentVideoData.video_id !== currentRequestedVideoId;
            
            const adPopup = document.getElementById('tv-ad-popup');
            const ytContainer = document.getElementById('youtube-player');
            
            if (isAd && playing) {
              // Show Ad Popup
              if (adPopup) adPopup.classList.remove('hidden');
              // Make iframe visible and clickable so user can click "Skip Ad"
              if (ytContainer) {
                ytContainer.classList.remove('opacity-0', 'pointer-events-none');
                ytContainer.classList.add('opacity-100', 'pointer-events-auto', 'z-50');
              }
            } else if (playing) {
              // Hide Ad Popup
              if (adPopup) adPopup.classList.add('hidden');
              // Hide iframe again
              if (ytContainer) {
                ytContainer.classList.add('opacity-0', 'pointer-events-none');
                ytContainer.classList.remove('opacity-100', 'pointer-events-auto', 'z-50');
              }
            }
            
            // Notify Remote about state change
            if (conn) {
              conn.send({ type: 'tv-state-change', isPlaying: playing });
            }

            if (playing) {
              startTimeUpdates();
            } else {
              stopTimeUpdates();
            }
          },
          'onError': (event) => {
            // If video is restricted or errors out, notify and keep UI stable
            console.warn('YouTube Player error code:', event.data);
          }
        }
      });
    }

    // Lyrics loader
    function setTVLyrics(type, rawLyrics) {
      const container = document.getElementById('tv-lyrics-list');
      container.innerHTML = '';
      currentLyricIndex = -1;

      if (type === 'notFound' || !rawLyrics) {
        lyricsLines = [];
        container.innerHTML = `<div class="flex h-full items-center justify-center text-gray-500 font-display text-2xl">Testo non disponibile</div>`;
        return;
      }

      if (type === 'synced') {
        lyricsLines = parseLrc(rawLyrics);
      } else {
        lyricsLines = parsePlain(rawLyrics);
      }

      lyricsLines.forEach((line, idx) => {
        const div = document.createElement('div');
        div.className = 'lyric-line future';
        div.setAttribute('data-index', idx);
        div.innerText = line.text;
        container.appendChild(div);
      });
    }

    // Scroll Polling
    function startTimeUpdates() {
      stopTimeUpdates();
      progressInterval = setInterval(() => {
        if (ytPlayer && typeof ytPlayer.getCurrentTime === 'function') {
          const current = ytPlayer.getCurrentTime();
          const duration = ytPlayer.getDuration() || 0;
          
          document.getElementById('tv-time-current').innerText = formatTime(current);
          const percent = duration > 0 ? (current / duration) * 100 : 0;
          document.getElementById('tv-progress-fill').style.width = `${percent}%`;

          // Sync Time updates to Remote
          if (conn) {
            conn.send({ type: 'tv-time-sync', currentTime: current, duration: duration });
          }

          // Sync lyrics scrolling
          syncLyrics(current);
        }
      }, 250);
    }

    function stopTimeUpdates() {
      if (progressInterval) {
        clearInterval(progressInterval);
        progressInterval = null;
      }
    }

    function syncLyrics(time) {
      if (lyricsLines.length === 0) return;

      let activeIdx = -1;
      for (let i = 0; i < lyricsLines.length; i++) {
        if (lyricsLines[i].timestamp <= time) {
          activeIdx = i;
        } else {
          break;
        }
      }

      if (activeIdx !== currentLyricIndex) {
        currentLyricIndex = activeIdx;
        
        // Reset classes
        const lines = document.querySelectorAll('.lyric-line');
        lines.forEach((line, idx) => {
          line.classList.remove('active', 'past', 'future');
          if (idx === currentLyricIndex) {
            line.classList.add('active');
            
            // Scroll to center
            line.scrollIntoView({
              behavior: 'smooth',
              block: 'center'
            });
          } else if (idx < currentLyricIndex) {
            line.classList.add('past');
          } else {
            line.classList.add('future');
          }
        });
      }
    }

    function showTVMirror(stream) {
      isMirroring = true;
      document.getElementById('tv-player-screen').classList.add('hidden');
      document.getElementById('tv-mirror-screen').classList.remove('hidden');

      const video = document.getElementById('tv-mirror-video');
      video.srcObject = stream;
      
      // Auto full screen
      requestFullscreen();
    }

    function stopMirroringTV() {
      isMirroring = false;
      document.getElementById('tv-mirror-screen').classList.add('hidden');
      document.getElementById('tv-player-screen').classList.remove('hidden');
      
      const video = document.getElementById('tv-mirror-video');
      video.srcObject = null;
      
      if (callInstance) {
        callInstance.close();
        callInstance = null;
      }
    }

    // Fullscreen Helpers
    function requestFullscreen() {
      const doc = document.documentElement;
      if (doc.requestFullscreen) {
        doc.requestFullscreen().catch(() => {});
      }
    }

    function toggleFullscreen() {
      const icon = document.getElementById('fs-icon');
      if (document.fullscreenElement) {
        document.exitFullscreen().then(() => {
          icon.setAttribute('data-lucide', 'maximize');
          lucide.createIcons();
        });
      } else {
        document.documentElement.requestFullscreen().then(() => {
          icon.setAttribute('data-lucide', 'minimize');
          lucide.createIcons();
        }).catch(() => {});
      }
    }

    // --- PARSING HELPERS ---
    function parseLrc(lrcString) {
      const lines = [];
      const pattern = /\[(\d{2}):(\d{2})\.(\d{2,3})\]\s*(.*)/;
      
      const rawLines = lrcString.split('\n');
      rawLines.forEach(line => {
        const match = pattern.exec(line);
        if (match) {
          const min = parseInt(match[1]);
          const sec = parseInt(match[2]);
          const ms = parseInt(match[3]);
          const text = match[4].trim();
          
          const timestamp = min * 60 + sec + ms / (match[3].length === 2 ? 100 : 1000);
          if (text) {
            lines.push({ timestamp, text });
          }
        }
      });
      return lines.sort((a, b) => a.timestamp - b.timestamp);
    }

    function parsePlain(text) {
      return text.split('\n')
        .map(line => line.trim())
        .filter(line => line.length > 0)
        .map((line, index) => ({
          timestamp: index * 5.0,
          text: line
        }));
    }

    function formatTime(seconds) {
      if (isNaN(seconds) || seconds === null) return '00:00';
      const min = Math.floor(seconds / 60);
      const sec = Math.floor(seconds % 60);
      return `${min < 10 ? '0' + min : min}:${sec < 10 ? '0' + sec : sec}`;
    }
  </script>
